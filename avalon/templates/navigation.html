{% macro menu(playlists) %}
  <div class="navigation_menu">
    <h2>Avalon</h2>
    <ul>
      <li><a href="/">Home</a></li>
      <li><a href="/artists/">Artists</a></li>
      <li><a href="/albums/">Albums</a></li>
      <li><a href="/hubs/">Hubs</a></li>
    </ul>
    <h3>Playlists</h3>
    <uL>
      {% for playlist in playlists %}
        <li><a href="/playlists/{{ playlist.id }}">{{ playlist.title }}</a></li>
      {% endfor %}
    </uL>
    <form action="/playlists/create/" method="post">
        <div>
            <label for="playlist_title">Create Playlist:</label><br>
            <input type="text" name="playlist_title" id="playlist_title">
            <input type="submit" value="Submit">
        </div>
    </form>
    <h3>Database</h3>
    <ul>
      <li><a href="/input-metadata">Add Album</a></li>
      <li><a href="/update-database">Update Database</a></li>
    </ul>
  </div>
{% endmacro %}
