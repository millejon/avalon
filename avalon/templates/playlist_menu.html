{% macro add_to_playlist(playlists, song) %}
  <div class="playlist_selector">
    <button onclick="displayPlaylists({{ song }})" class="display_playlist_button">+</button>
    <div id="playlists_list_{{ song }}" class="playlists_list">
      {% for playlist in playlists %}
        <a href="/playlists/{{ playlist.id }}/songs/{{ song }}">{{ playlist.title }}</a>
      {% endfor %}
    </div>
  </div>
{% endmacro %}
